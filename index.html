<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8">
  <!-- Sinasabi sa browser na gamitin ang buong lapad ng screen ng phone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AgriSense PH — Smart Disease Detector</title>

  <!-- ============================================================
       PWA META TAGS
       Ginagawa nitong parang tunay na app ang website kapag
       na-add to home screen sa phone.
  ============================================================ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AgriSense PH">
  <meta name="theme-color" content="#1e5c1e">
  <meta name="description" content="AI-powered crop disease detection for Central Luzon farmers">

  <!-- PWA Manifest at Apple Touch Icon -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- ============================================================
       CSS FILES
       Ang bawat CSS file ay may sariling responsibilidad.
       Inilo-load ito bago ang content para walang FOUC
       (Flash of Unstyled Content).
  ============================================================ -->
  <link rel="stylesheet" href="css/app.css">      <!-- Base styles -->
  <link rel="stylesheet" href="css/weather.css">  <!-- Weather card -->
  <link rel="stylesheet" href="css/result.css">   <!-- Result card -->
</head>
<body>

  <!-- ============================================================
       APP HEADER
       Laging nakikita sa taas — hindi nag-i-scroll.
  ============================================================ -->
  <header class="app-header">
    <div class="header-left">
      <!-- App logo -->
      <div class="app-logo">🌿</div>
      <!-- App name at tagline -->
      <div>
        <div class="app-name-text">AgriSense PH</div>
        <div class="app-tagline" id="app-tagline">Smart Disease Detector · Central Luzon</div>
      </div>
    </div>
    <!-- Language toggle button — FIL / EN -->
    <button class="lang-toggle" onclick="toggleLanguage()" id="lang-btn" aria-label="Toggle language">
      <span class="active-lang" id="lang-active">FIL</span>
      <span style="color:rgba(255,255,255,0.5)">/</span>
      <span id="lang-inactive" style="color:rgba(255,255,255,0.5)">EN</span>
    </button>
  </header>

  <!-- ============================================================
       MAIN SCROLLABLE CONTENT
       Ang lahat ng visible na content ay nasa loob nito.
       Ito ang nag-i-scroll — ang header at nav ay nanatili.
  ============================================================ -->
  <main class="screen-content" id="screen-content">

    <!-- ========================================================
         WEATHER SECTION
         Ang weather hero card ay ini-render ng weather.js.
         Ang id="weather-body" ang target ng renderWeatherCard().
    ======================================================== -->
    <div class="weather-hero" id="weather-hero">
      <div id="weather-body">
        <!-- Puno ng weather.js -->
      </div>
    </div>

    <!-- ========================================================
         CROP SELECTOR
         Nagbibigay ng pagpipilian sa pagitan ng Palay at Kamatis.
    ======================================================== -->
    <div class="section-label" id="crop-label">Pananim / Crop</div>
    <div class="crop-row">
      <!-- Rice button — may risk dot para sa weather indicator -->
      <button class="crop-btn active" id="crop-rice"
              onclick="selectCrop('rice')"
              aria-label="Piliin ang palay">
        <span class="crop-emoji">🌾</span>
        <div class="crop-name" id="rice-name">
          Palay
          <span class="crop-risk-dot" id="rice-risk-dot" style="display:none"></span>
        </div>
        <div class="crop-sub">Rice</div>
      </button>

      <!-- Tomato button -->
      <button class="crop-btn" id="crop-tomato"
              onclick="selectCrop('tomato')"
              aria-label="Piliin ang kamatis">
        <span class="crop-emoji">🍅</span>
        <div class="crop-name" id="tomato-name">
          Kamatis
          <span class="crop-risk-dot" id="tomato-risk-dot" style="display:none"></span>
        </div>
        <div class="crop-sub">Tomato</div>
      </button>
    </div>

    <!-- ========================================================
         CAMERA / UPLOAD SECTION
         Lugar kung saan makikita ang camera feed o uploaded photo.
    ======================================================== -->
    <div class="section-label" id="photo-label">Larawan / Photo</div>

    <!-- Preview area — camera feed o uploaded photo -->
    <div class="preview-wrap" id="preview-wrap">
      <!-- Camera video feed — nakatago sa simula -->
      <video id="video" autoplay playsinline></video>

      <!-- Uploaded photo preview — nakatago sa simula -->
      <img id="uploaded-img" alt="Leaf photo">

      <!-- Placeholder — ipinakita kapag walang camera o photo -->
      <div class="placeholder-content" id="placeholder">
        <svg viewBox="0 0 48 48">
          <rect x="4" y="10" width="40" height="30" rx="4"/>
          <circle cx="24" cy="25" r="8"/>
          <path d="M16 10l3-5h10l3 5"/>
        </svg>
        <p id="placeholder-text">Itutok ang camera sa dahon ng palay</p>
      </div>
    </div>

    <!-- Camera at Upload buttons -->
    <div class="action-row">
      <button class="btn-action btn-camera" id="btn-camera"
              onclick="startCamera()"
              aria-label="Buksan ang camera">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="15" rx="2"/>
          <path d="M16 7l-2-4H10L8 7"/>
          <circle cx="12" cy="14" r="3"/>
        </svg>
        Camera
      </button>

      <button class="btn-action btn-upload"
              onclick="document.getElementById('file-input').click()"
              aria-label="Mag-upload ng larawan">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload
      </button>
    </div>

    <!-- Hidden file input — nag-o-open ng photo picker sa phone -->
    <input type="file" id="file-input" accept="image/*"
           style="display:none" onchange="handleUpload(event)">

    <!-- Detect button — disabled hanggang may larawan -->
    <button class="btn-detect" id="btn-detect"
            onclick="runDetection()" disabled
            aria-label="Suriin ang dahon">
      <span id="detect-text">🔍 Suriin ang Dahon / Detect Disease</span>
      <!-- Spinner — ipinakita habang nag-de-detect ang AI -->
      <div class="spinner" id="spinner" aria-hidden="true"></div>
    </button>

    <!-- Status message — nagpapakita ng state ng app -->
    <div id="status-msg" role="status" aria-live="polite">
      Nilo-load ang modelo ng palay...
    </div>

    <!-- ========================================================
         RESULT CARD
         Nakatago hanggang may resulta ang detection.
         Pinuno ng results.js ang lahat ng content dito.
    ======================================================== -->
    <section class="result-card" id="result-card" aria-label="Detection result">
      <!-- Crop badge — "🌾 Palay" o "🍅 Kamatis" -->
      <span class="result-crop-badge badge-rice" id="result-badge">🌾 Palay</span>

      <!-- Detected disease name -->
      <div class="result-disease-name disease" id="result-name">—</div>

      <!-- Confidence bar -->
      <div class="conf-label" id="conf-label">Katumpakan: 0%</div>
      <div class="conf-track">
        <div class="conf-fill" id="conf-fill" style="width:0%"></div>
      </div>

      <!-- Treatment recommendation — puno ng results.js -->
      <div id="treatment-box"></div>

      <!-- Weather alert — puno ng results.js kung may koneksyon -->
      <div id="weather-alert-result"></div>

      <!-- Read aloud button -->
      <button class="btn-speak" id="btn-speak"
              onclick="speakResult()"
              aria-label="Basahin nang malakas ang resulta">
        🔊 Basahin nang Malakas
      </button>

      <!-- All AI confidence scores -->
      <div class="all-scores" id="all-scores"></div>
    </section>

  </main><!-- end screen-content -->

  <!-- ============================================================
       BOTTOM NAVIGATION BAR
       4 tabs na parang tunay na mobile app.
  ============================================================ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="nav-tab" id="tab-home"
            onclick="switchTab('home')"
            aria-label="Home">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="nav-label">Home</span>
    </button>

    <button class="nav-tab active" id="tab-detect"
            onclick="switchTab('detect')"
            aria-label="Suriin ang dahon">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="nav-label">Suriin</span>
    </button>

    <button class="nav-tab" id="tab-analytics"
            onclick="switchTab('analytics')"
            aria-label="Analytics dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
      <span class="nav-label">Analytics</span>
    </button>

    <button class="nav-tab" id="tab-weather"
            onclick="switchTab('weather')"
            aria-label="Weather forecast">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/>
      </svg>
      <span class="nav-label">Panahon</span>
      <!-- Notification dot — lalabas kapag high risk ang weather -->
      <div class="nav-dot" id="weather-nav-dot" style="display:none" aria-hidden="true"></div>
    </button>
  </nav>

  <!-- ============================================================
       AI MODEL LIBRARIES
       Inilo-load mula sa libs/ folder para gumana offline.
       Kailangan itong i-load BAGO ang ating JS files.
  ============================================================ -->
  <!-- Firebase SDKs — para sa cloud sync -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <!-- AI Model Libraries -->
  <script src="libs/tf.min.js"></script>
  <script src="libs/teachablemachine-image.min.js"></script>

  <!-- ============================================================
       APP JAVASCRIPT FILES
       Inilo-load sa tamang pagkakasunod-sunod —
       ang mga dependencies ay una, ang app.js ay huli.
       Ang bawat file ay may sariling responsibilidad.
  ============================================================ -->
  <script src="js/firebase.js"></script>          <!-- 0. Firebase connection (FIRST) -->
  <script src="js/sync.js"></script>             <!-- 0b. Cloud sync -->
  <script src="js/config.js"></script>          <!-- 1. Configuration -->
  <script src="js/state.js"></script>           <!-- 2. App state -->
  <script src="js/diseases.js"></script>        <!-- 3. Disease database -->
  <script src="js/weather-rules.js"></script>   <!-- 4. Weather risk rules -->
  <script src="js/language.js"></script>        <!-- 5. Language/translations -->
  <script src="js/voice.js"></script>           <!-- 6. Text-to-speech -->
  <script src="js/history.js"></script>         <!-- 7. Detection history -->
  <script src="js/camera.js"></script>          <!-- 8. Camera handling -->
  <script src="js/model.js"></script>           <!-- 9. AI model loading -->
  <script src="js/weather.js"></script>         <!-- 10. Weather API -->
  <script src="js/results.js"></script>         <!-- 11. Results display -->
  <script src="js/app.js"></script>             <!-- 12. App init (LAST) -->

</body>
</html>
