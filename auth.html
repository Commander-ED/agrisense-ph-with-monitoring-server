<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriSense PH — Login</title>
  <meta name="theme-color" content="#1e5c1e">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f0f5f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── App Logo & Header ── */
    .auth-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo {
      width: 72px; height: 72px;
      background: #1e5c1e;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 14px;
    }
    .auth-title    { font-size: 22px; font-weight: 800; color: #1a3d1a; }
    .auth-subtitle { font-size: 13px; color: #5a7a5a; margin-top: 4px; }

    /* ── Auth Card ── */
    .auth-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 24px 20px;
      width: 100%;
      max-width: 380px;
    }

    /* ── Tab Toggle (Login / Register) ── */
    .tab-row {
      display: flex;
      background: #f0f5f0;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1; padding: 9px;
      border: none; background: transparent;
      border-radius: 9px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      color: #5a7a5a; transition: all 0.15s;
    }
    .tab-btn.active {
      background: #fff;
      color: #1a3d1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ── Form Elements ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: #3a6a3a; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .form-input, .form-select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #d4e8d4;
      border-radius: 12px; font-size: 14px;
      background: #fff; color: #1a3a1a;
      transition: border-color 0.15s;
      outline: none;
      appearance: none;
    }
    .form-input:focus, .form-select:focus {
      border-color: #1e5c1e;
    }

    /* ── Role Selector Cards ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .role-card {
      border: 2px solid #d4e8d4;
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      background: #f5fbf5;
    }
    .role-card.active {
      border-color: #1e5c1e;
      background: #eaf5ea;
    }
    .role-icon  { font-size: 22px; display: block; margin-bottom: 4px; }
    .role-name  { font-size: 11px; font-weight: 700; color: #1a3a1a; }
    .role-desc  { font-size: 9px; color: #5a7a5a; margin-top: 1px; }
    .role-card.active .role-name { color: #1e5c1e; }

    /* ── Barangay Input (for farmers) ── */
    #barangay-group { display: none; }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%; padding: 14px;
      background: #1e5c1e; color: #fff;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
      transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .btn-submit:active  { transform: scale(0.98); opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error / Success Messages ── */
    .msg-box {
      border-radius: 10px; padding: 10px 12px;
      font-size: 12px; line-height: 1.5;
      margin-bottom: 14px; display: none;
    }
    .msg-box.error   { background: #fff0f0; color: #8a1010; border: 1px solid #ffc0c0; }
    .msg-box.success { background: #eaf5ea; color: #1a5a1a; border: 1px solid #a8d4a8; }

    /* ── Admin Code Input (hidden by default) ── */
    #admin-code-group { display: none; }

    /* ── Loading Spinner ── */
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      text-align: center; font-size: 12px;
      color: #9aaa9a; margin: 14px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute;
      top: 50%; width: 40%; height: 1px;
      background: #d4e8d4;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .footer-text {
      text-align: center; font-size: 12px;
      color: #7a9a7a; margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- App Header -->
  <div class="auth-header">
    <div class="auth-logo">🌿</div>
    <div class="auth-title">AgriSense PH</div>
    <div class="auth-subtitle">Smart Crop Disease Detection · Central Luzon</div>
  </div>

  <!-- Auth Card -->
  <div class="auth-card">

    <!-- Tab Toggle -->
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login"
              onclick="switchTab('login')">Mag-login</button>
      <button class="tab-btn" id="tab-register"
              onclick="switchTab('register')">Mag-register</button>
    </div>

    <!-- Error / Success Message -->
    <div class="msg-box" id="msg-box"></div>

    <!-- ── LOGIN FORM ── -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email"
               placeholder="iyong@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="login-password"
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" id="btn-login" onclick="handleLogin()">
        <span id="login-text">Mag-login</span>
        <div class="spinner" id="login-spinner"></div>
      </button>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div id="register-form" style="display:none">

      <!-- Role Selection -->
      <div class="form-group">
        <label class="form-label">Piliin ang iyong role</label>
        <div class="role-grid">
          <div class="role-card active" id="role-farmer"
               onclick="selectRole('farmer')">
            <span class="role-icon">👨‍🌾</span>
            <div class="role-name">Farmer</div>
            <div class="role-desc">Mag-detect ng sakit</div>
          </div>
          <div class="role-card" id="role-admin"
               onclick="selectRole('admin')">
            <span class="role-icon">👨‍💼</span>
            <div class="role-name">Admin</div>
            <div class="role-desc">Analytics dashboard</div>
          </div>
          <div class="role-card" id="role-da_officer"
               onclick="selectRole('da_officer')">
            <span class="role-icon">🏛️</span>
            <div class="role-name">DA Officer</div>
            <div class="role-desc">Gov't monitoring</div>
          </div>
        </div>
      </div>

      <!-- Admin/DA Code (para ma-verify) -->
      <div class="form-group" id="admin-code-group">
        <label class="form-label">Access Code</label>
        <input type="password" class="form-input" id="admin-code"
               placeholder="I-enter ang access code">
        <div style="font-size:11px;color:#7a9a7a;margin-top:4px">
          Makuha ang access code mula sa inyong system administrator.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Buong Pangalan</label>
        <input type="text" class="form-input" id="reg-name"
               placeholder="Juan dela Cruz">
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="reg-email"
               placeholder="iyong@email.com" autocomplete="email">
      </div>

      <!-- Barangay (para sa farmers) -->
      <div class="form-group" id="barangay-group">
        <label class="form-label">Barangay / Municipality</label>
        <input type="text" class="form-input" id="reg-barangay"
               placeholder="hal. Brgy. Lidong, Cabanatuan City">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="reg-password"
               placeholder="Minimum 6 characters" autocomplete="new-password">
      </div>

      <button class="btn-submit" id="btn-register" onclick="handleRegister()">
        <span id="register-text">Mag-register</span>
        <div class="spinner" id="register-spinner"></div>
      </button>
    </div>

  </div>

  <div class="footer-text">
    AgriSense PH v2.0 · Para sa mga magsasaka ng Central Luzon
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    // ── ACCESS CODES ────────────────────────────────────────────
    // Sa production, i-store ito sa server — hindi sa client side.
    // Para sa demo/innovation presentation, okay lang dito.
    const ACCESS_CODES = {
      admin:      'admin1234',  // Palitan ng inyong secret code
      da_officer: 'admin1234'   // Palitan ng inyong secret code
    };

    // ── STATE ───────────────────────────────────────────────────
    let currentTab  = 'login';
    let currentRole = 'farmer';

    // ── TAB SWITCHING ───────────────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideMsg();
    }

    // ── ROLE SELECTION ──────────────────────────────────────────
    function selectRole(role) {
      currentRole = role;

      // I-update ang role card visual states
      ['farmer', 'admin', 'da_officer'].forEach(r => {
        document.getElementById(`role-${r}`).classList.toggle('active', r === role);
      });

      // Ipakita ang barangay field para sa farmers
      document.getElementById('barangay-group').style.display =
        role === 'farmer' ? 'block' : 'none';

      // Ipakita ang access code para sa admin at DA officer
      document.getElementById('admin-code-group').style.display =
        role !== 'farmer' ? 'block' : 'none';
    }

    // ── LOGIN ───────────────────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showMsg('error', 'Punan ang email at password.');
        return;
      }

      setLoading('login', true);
      hideMsg();

      try {
        // Firebase Auth sign in
        const credential = await auth.signInWithEmailAndPassword(email, password);

        // Kunin ang user profile para malaman ang role
        const userDoc = await COLLECTIONS.users.doc(credential.user.uid).get();

        if (!userDoc.exists) {
          showMsg('error', 'Hindi mahanap ang user profile. Makipag-ugnayan sa admin.');
          await auth.signOut();
          return;
        }

        const role = userDoc.data().role;

        // I-redirect batay sa role
        redirectByRole(role);

      } catch (error) {
        setLoading('login', false);
        showMsg('error', getAuthErrorMessage(error.code));
      }
    }

    // ── REGISTER ────────────────────────────────────────────────
    async function handleRegister() {
      const name      = document.getElementById('reg-name').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value;
      const barangay  = document.getElementById('reg-barangay').value.trim();
      const adminCode = document.getElementById('admin-code').value.trim();

      // Validation
      if (!name || !email || !password) {
        showMsg('error', 'Punan ang lahat ng kinakailangang fields.');
        return;
      }
      if (password.length < 6) {
        showMsg('error', 'Ang password ay dapat hindi bababa sa 6 na characters.');
        return;
      }
      if (currentRole === 'farmer' && !barangay) {
        showMsg('error', 'Ilagay ang inyong barangay.');
        return;
      }

      // I-verify ang access code para sa admin at DA officer
      if (currentRole !== 'farmer') {
        if (adminCode !== ACCESS_CODES[currentRole]) {
          showMsg('error', 'Mali ang access code. Makipag-ugnayan sa administrator.');
          return;
        }
      }

      setLoading('register', true);
      hideMsg();

      try {
        // Gumawa ng Firebase Auth account
        const credential = await auth.createUserWithEmailAndPassword(email, password);

        // I-save ang user profile sa Firestore
        await COLLECTIONS.users.doc(credential.user.uid).set({
          name:      name,
          email:     email,
          role:      currentRole,
          barangay:  currentRole === 'farmer' ? barangay : null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          active:    true
        });

        showMsg('success', `Matagumpay na na-register bilang ${getRoleLabel(currentRole)}! Nire-redirect...`);

        // I-redirect pagkatapos ng 1.5 segundo
        setTimeout(() => redirectByRole(currentRole), 1500);

      } catch (error) {
        setLoading('register', false);
        showMsg('error', getAuthErrorMessage(error.code));
      }
    }

    // ── REDIRECT BY ROLE ────────────────────────────────────────
    function redirectByRole(role) {
      const redirectMap = {
        farmer:     'index.html',        // Farmer app
        admin:      'admin.html',        // Admin dashboard
        da_officer: 'da-dashboard.html'  // DA Officer dashboard
      };
      window.location.href = redirectMap[role] || 'index.html';
    }

    // ── HELPERS ─────────────────────────────────────────────────
    function setLoading(type, isLoading) {
      const btn  = document.getElementById(`btn-${type}`);
      const text = document.getElementById(`${type}-text`);
      const spin = document.getElementById(`${type}-spinner`);
      btn.disabled           = isLoading;
      text.style.display     = isLoading ? 'none'         : 'inline';
      spin.style.display     = isLoading ? 'inline-block' : 'none';
    }

    function showMsg(type, message) {
      const box = document.getElementById('msg-box');
      box.className   = `msg-box ${type}`;
      box.textContent = message;
      box.style.display = 'block';
    }

    function hideMsg() {
      document.getElementById('msg-box').style.display = 'none';
    }

    function getRoleLabel(role) {
      return { farmer: 'Farmer', admin: 'Admin', da_officer: 'DA Officer' }[role] || role;
    }

    function getAuthErrorMessage(code) {
      const messages = {
        'auth/user-not-found':    'Hindi mahanap ang account na ito.',
        'auth/wrong-password':    'Mali ang password.',
        'auth/invalid-email':     'Hindi valid ang email address.',
        'auth/email-already-in-use': 'Ginagamit na ang email na ito.',
        'auth/weak-password':     'Masyadong mahina ang password (minimum 6 characters).',
        'auth/too-many-requests': 'Masyadong maraming pagsubok. Subukan muli mamaya.',
        'auth/network-request-failed': 'Walang internet connection.'
      };
      return messages[code] || 'May error na nangyari. Subukan muli.';
    }

    // ── CHECK IF ALREADY LOGGED IN ──────────────────────────────
    // Kung may naka-login na — i-redirect agad
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const userDoc = await COLLECTIONS.users.doc(user.uid).get();
        if (userDoc.exists) {
          redirectByRole(userDoc.data().role);
        }
      }
    });
  </script>
</body>
</html>
